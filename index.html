    <!-- Scripts de React, Babel y Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconos Lucide y FontAwesome -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Urbanist:wght@600;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,700;0,9..40,900;1,9..40,700;1,9..40,900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-pb: #49d5ba;
            --secondary-pb: #bbf4ed;
            --bg-body: #eeecec;
            --surface: #e0dcdc;
            --text: #000000;
            --accent: #49d5ba;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'DM Sans', 'Inter', sans-serif;
            background-color: var(--bg-body);
            -webkit-font-smoothing: antialiased;
        }
        .font-black { font-weight: 900; }
        .italic { font-style: italic; }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c0bcbc; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #49d5ba; }

        .animate-fade-in { animation: fadeIn 0.55s cubic-bezier(0.22,1,0.36,1) both; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── HOME: editorial byxp ── */
        .home-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-body);
        }
        .home-header {
            padding: 1.75rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }
        .home-cards-grid {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        @media (min-width: 768px) {
            .home-cards-grid { flex-direction: row; }
        }
        .home-nav-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem 2.5rem 2.5rem;
            cursor: pointer;
            transition: background-color 0.28s ease;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
            user-select: none;
        }
        @media (min-width: 768px) {
            .home-nav-card {
                border-bottom: none;
                border-right: 1px solid rgba(0,0,0,0.08);
            }
            .home-nav-card:last-child { border-right: none; }
        }
        .home-nav-card:hover { background-color: #000; }
        .home-nav-card:hover .card-eyebrow { color: rgba(255,255,255,0.35); }
        .home-nav-card:hover .card-title { color: #fff; }
        .home-nav-card:hover .card-subtitle-accent { color: var(--accent); }
        .home-nav-card:hover .card-desc { color: rgba(255,255,255,0.45); }
        .home-nav-card:hover .card-arrow { background-color: var(--accent); color: #000; }
        .home-nav-card:active { opacity: 0.92; }

        .card-eyebrow {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(0,0,0,0.35);
            transition: color 0.28s;
            margin-bottom: 1.25rem;
        }
        .card-top-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .card-title {
            font-family: 'DM Sans', sans-serif;
            font-size: clamp(3.5rem, 9vw, 6rem);
            font-weight: 900;
            line-height: 0.88;
            letter-spacing: -0.04em;
            text-transform: uppercase;
            color: #000;
            transition: color 0.28s;
        }
        .card-subtitle-accent {
            font-family: 'DM Sans', sans-serif;
            font-size: clamp(1rem, 2.5vw, 1.4rem);

            letter-spacing: -0.02em;

            font-weight: 500;
            line-height: 1.55;

        .card-arrow {

            flex-shrink: 0;

        .card-bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 3rem;
        }
        .card-step-badge {
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(0,0,0,0.2);
            transition: color 0.28s;
        }
        .home-nav-card:hover .card-step-badge { color: rgba(255,255,255,0.25); }

        /* ── NAVIGATION INTERNA ── */
        .btn-home-pill {
            background-color: #000;
            color: #fff;
            border-radius: 9999px;
            padding: 1.25rem 2rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            font-size: 1.5rem;
            letter-spacing: -0.025em;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 320px;
            text-align: center;
        }
        .btn-home-pill:hover { transform: translateY(-2px); filter: brightness(1.2); }
        .btn-home-pill:active { transform: scale(0.96); }

        /* ── MODULOS SECCIÓN (Idea Hub / Canal) ── */
        .urbanist { font-family: 'Urbanist', 'DM Sans', sans-serif; }
        .main-card-pb {
            background-color: var(--surface);
            border-radius: 1.25rem;
            border: 1px solid rgba(0,0,0,0.04);
        }
        .data-table-container-pb {
            background-color: rgba(255,255,255,0.6);
            border-radius: 0.75rem;
            overflow: hidden;
        }
        .niche-tag-pb {
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 9999px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.08em;
            background-color: var(--secondary-pb);
            color: #1f5a4e;
        }
        .notepad-area-pb {
            background-color: #ffffff;
            background-image: linear-gradient(var(--bg-body) 1px, transparent 1px);
            background-size: 100% 2.5rem;
            line-height: 2.5rem;
        }

        /* ── MÓDULO HEADER EDITORIAL ── */
        .module-eyebrow {
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(0,0,0,0.35);
        }
        .module-eyebrow-accent {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .module-eyebrow-accent::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--accent);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "", strokeWidth = 2, color = "currentColor" }) => {
            useEffect(() => {
                if (window.lucide) lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size, strokeWidth: strokeWidth, color: color }}></i>;
        };

        const LivoLogo = ({ className = "h-48" }) => (
            <svg viewBox="0 0 300 200" className={className} fill="none" xmlns="http://www.w3.org/2000/svg">
                <text x="20" y="120" fontFamily="Inter, sans-serif" fontWeight="900" fontSize="110" fill="black" style={{ letterSpacing: '-5px' }}>L</text>
                <text x="85" y="120" fontFamily="Inter, sans-serif" fontWeight="900" fontSize="110" fill="black" style={{ letterSpacing: '-5px' }}>ı</text>
                <circle cx="98" cy="45" r="14" fill="#00ead0" />
                <text x="120" y="120" fontFamily="Inter, sans-serif" fontWeight="900" fontSize="110" fill="black" style={{ letterSpacing: '-5px' }}>vo</text>
                <text x="200" y="170" fontFamily="Inter, sans-serif" fontWeight="900" fontSize="55" fill="#00ead0">mx</text>
            </svg>
        );

        const App = () => {
            const colors = {
                neon: '#00ead0',
                primaryPB: '#49d5ba',
                bg: '#f2f0f0',
                card: '#d9d9d9'
            };

            const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyC0yN_r6mC0Z5m7-W8m3yE3O-K_Zp8f5j6yA/exec';

            const [currentView, setCurrentView] = useState('home');
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncStatus, setSyncStatus] = useState(''); // '', 'ok', 'error'

            // --- ESTADOS IDEA HUB ---
            const [canales, setCanales] = useState([]);
            const [ideasGenerales, setIdeasGenerales] = useState([]);
            const [activeIdeaTab, setActiveIdeaTab] = useState('captacion');
            const [filtroCanalDestino, setFiltroCanalDestino] = useState('Todos');
            const [showModalIdea, setShowModalIdea] = useState(false);
            const [showModalCanal, setShowModalCanal] = useState(false);

            // --- ESTADOS PUNTO B (CANAL RADAR) ---
            const [registrosPuntoB, setRegistrosPuntoB] = useState([]);
            const [showModalPBRapido, setShowModalPBRapido] = useState(false);
            const [showModalPBDesarrollo, setShowModalPBDesarrollo] = useState(false);
            const [showModalPBNotas, setShowModalPBNotas] = useState(false);
            const [editItem, setEditItem] = useState(null);
            const [notaActiva, setNotaActiva] = useState({ id: null, titulo: '', contenido: '' });

            // --- CARGA INICIAL DESDE LA NUBE ---
            const fetchData = async () => {
                setIsSyncing(true);
                setSyncStatus('');
                try {
                    const res = await fetch(SCRIPT_URL);
                    const data = await res.json();
                    if (data.canales) setCanales(data.canales);
                    if (data.ideas) setIdeasGenerales(data.ideas);
                    if (data.radar) setRegistrosPuntoB(data.radar);
                    setSyncStatus('ok');
                } catch (err) {
                    console.error('Error al cargar datos:', err);
                    setSyncStatus('error');
                } finally {
                    setIsSyncing(false);
                }
            };

            useEffect(() => { fetchData(); }, []);

            // --- SINCRONIZACIÓN CON LA NUBE ---
            const syncData = async (newCanales, newIdeas, newRadar) => {
                setIsSyncing(true);
                setSyncStatus('');
                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            canales: newCanales,
                            ideas: newIdeas,
                            radar: newRadar
                        })
                    });
                    setSyncStatus('ok');
                } catch (err) {
                    console.error('Error al sincronizar:', err);
                    setSyncStatus('error');
                } finally {
                    setIsSyncing(false);
                }
            };

            // --- FUNCIONES IDEA HUB ---
            const agregarCanal = (e) => {
                e.preventDefault();
                const nombre = e.target.nuevoCanal.value.trim().toUpperCase();
                if (!nombre) return;
                const newCanales = [...canales, { id: Date.now(), nombre }];
                setCanales(newCanales);
                syncData(newCanales, ideasGenerales, registrosPuntoB);
                e.target.reset();
                setShowModalCanal(false);
            };

            const eliminarCanal = (id, nombre) => {
                if (confirm(`¿Eliminar el canal "${nombre}"?`)) {
                    const newCanales = canales.filter(c => c.id !== id);
                    setCanales(newCanales);
                    syncData(newCanales, ideasGenerales, registrosPuntoB);
                    if (filtroCanalDestino === nombre) setFiltroCanalDestino('Todos');
                }
            };

            const captarIdea = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const nuevaIdea = {
                    id: Date.now(),
                    titulo: formData.get('titulo'),
                    urlReferencia: formData.get('urlRef'),
                    urlObjetivo: formData.get('urlObj'),
                    canalDestino: formData.get('canalDestino'),
                    prioridad: 'Media',
                    estatus: 'Pendiente',
                    formato: 'PD',
                    fechaEstimada: ''
                };
                const newIdeas = [nuevaIdea, ...ideasGenerales];
                setIdeasGenerales(newIdeas);
                syncData(canales, newIdeas, registrosPuntoB);
                setShowModalIdea(false);
            };

            const updateIdea = (id, key, value) => {
                const newIdeas = ideasGenerales.map(i => i.id === id ? {...i, [key]: value} : i);
                setIdeasGenerales(newIdeas);
                syncData(canales, newIdeas, registrosPuntoB);
            };

            const eliminarIdea = (id) => {
                if (confirm('¿Eliminar esta idea definitivamente?')) {
                    const newIdeas = ideasGenerales.filter(i => i.id !== id);
                    setIdeasGenerales(newIdeas);
                    syncData(canales, newIdeas, registrosPuntoB);
                }
            };

            // --- FUNCIONES PUNTO B ---
            const registrarPBRapido = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const nuevo = {
                    id: Date.now(),
                    idClave: formData.get('idClave') || 'S/C',
                    nicho: formData.get('nicho'),
                    subnicho: formData.get('subnicho'),
                    micronicho: formData.get('micronicho') || '',
                    nanonicho: formData.get('nanonicho') || '',
                    idea: formData.get('ideaCanal'),
                    urlObjetivo: formData.get('urlObjetivo'),
                    redSocial: formData.get('redSocial'),
                    formato: formData.get('formato') || 'Videos Largos',
                    region: 'España/Latam', 
                    publico: 'General',
                    escalabilidad: 3, 
                    competencia: 3,
                    monetizacion: 'media', 
                    prioridad: 'media', 
                    estado: 'Idea',
                    observaciones: ''
                };
                const newRadar = [...registrosPuntoB, nuevo];
                setRegistrosPuntoB(newRadar);
                syncData(canales, ideasGenerales, newRadar);
                setShowModalPBRapido(false);
            };

            const guardarEdicionPB = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newRadar = registrosPuntoB.map(r => r.id === editItem.id ? {
                    ...r,
                    idClave: formData.get('idClave'),
                    nicho: formData.get('nicho'),
                    subnicho: formData.get('subnicho'),
                    micronicho: formData.get('micronicho'),
                    nanonicho: formData.get('nanonicho'),
                    idea: formData.get('idea'),
                    urlObjetivo: formData.get('urlObjetivo'),
                    redSocial: formData.get('redSocial'),
                    formato: formData.get('formato'),
                    region: formData.get('region'),
                    publico: formData.get('publico'),
                    escalabilidad: parseInt(formData.get('escalabilidad')),
                    competencia: parseInt(formData.get('competencia')),
                    monetizacion: formData.get('monetizacion'),
                    prioridad: formData.get('prioridad'),
                    estado: formData.get('estado')
                } : r);
                setRegistrosPuntoB(newRadar);
                syncData(canales, ideasGenerales, newRadar);
                setShowModalPBDesarrollo(false);
            };

            // --- VISTA HOME ---
            if (currentView === 'home') {
                return (
                    <div className="home-wrapper animate-fade-in">
                        {/* Header */}
                        <header className="home-header">
                            <LivoLogo className="h-10 md:h-12 w-auto" />
                            <div style={{display:'flex', alignItems:'center', gap:'0.5rem'}}>
                                <span className="module-eyebrow">Etapa 1 — Captación</span>
                                {isSyncing && <span style={{fontSize:'0.55rem', fontWeight:700, letterSpacing:'0.12em', textTransform:'uppercase', color:'rgba(0,0,0,0.35)'}}>· Sincronizando…</span>}
                                {!isSyncing && syncStatus === 'ok' && <span style={{fontSize:'0.55rem', fontWeight:700, letterSpacing:'0.12em', textTransform:'uppercase', color:'#00ead0'}}>· Nube ✓</span>}
                                {!isSyncing && syncStatus === 'error' && <span style={{fontSize:'0.55rem', fontWeight:700, letterSpacing:'0.12em', textTransform:'uppercase', color:'#f87171'}}>· Sin conexión</span>}
                            </div>
                        </header>

                        {/* Cards grid */}
                        <div className="home-cards-grid" style={{flex: 1}}>
                            {/* IDEA card */}
                            <div className="home-nav-card" onClick={() => setCurrentView('idea-hub')}>
                                <div>
                                    <p className="card-eyebrow">Módulo 01</p>
                                    <div className="card-top-row">
                                        <div>
                                            <div className="card-title">Idea</div>
                                            <div className="card-subtitle-accent">Hub</div>
                                        </div>
                                        <div className="card-arrow">
                                            <Icon name="arrow-right" size={16} strokeWidth={2.5} />
                                        </div>
                                    </div>
                                    <p className="card-desc">Captura, organiza y planifica cada concepto de contenido por canal destino.</p>
                                </div>
                                <div className="card-bottom-row">
                                    <span className="card-step-badge">Registro · Gestión · Config</span>
                                </div>
                            </div>

                            {/* CANAL card */}
                            <div className="home-nav-card" onClick={() => setCurrentView('canal-radar')}>
                                <div>
                                    <p className="card-eyebrow">Módulo 02</p>
                                    <div className="card-top-row">
                                        <div>
                                            <div className="card-title">Canal</div>
                                            <div className="card-subtitle-accent">Radar</div>
                                        </div>
                                        <div className="card-arrow">
                                            <Icon name="arrow-right" size={16} strokeWidth={2.5} />
                                        </div>
                                    </div>
                                    <p className="card-desc">Analiza nichos, captura canales potenciales y evalúa su monetización y escala.</p>
                                </div>
                                <div className="card-bottom-row">
                                    <span className="card-step-badge">Punto B · Análisis · Estrategia</span>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- VISTA IDEA HUB ---
            if (currentView === 'idea-hub') {
                return (
                    <div className="min-h-screen pb-20 animate-fade-in">
                        <nav style={{background:'#fff', borderBottom:'1px solid rgba(0,0,0,0.08)', padding:'0.75rem 1.5rem', position:'sticky', top:0, zIndex:40}}>
                            <div style={{maxWidth:'1600px', margin:'0 auto', display:'flex', justifyContent:'space-between', alignItems:'center', gap:'1rem'}}>
                                <div style={{display:'flex', alignItems:'center', gap:'1rem'}}>
                                    <button onClick={() => setCurrentView('home')} style={{padding:'0.5rem', borderRadius:'9999px', border:'1px solid rgba(0,0,0,0.1)', background:'transparent', cursor:'pointer', display:'flex', alignItems:'center', color:'#000'}}>
                                        <Icon name="chevron-left" size={18} strokeWidth={2.5} />
                                    </button>
                                    <div style={{display:'flex', alignItems:'center', gap:'0.4rem'}}>
                                        <span style={{fontSize:'0.58rem', fontWeight:700, letterSpacing:'0.2em', textTransform:'uppercase', color:'rgba(0,0,0,0.3)'}}>IDEA</span>
                                        <span style={{width:4, height:4, borderRadius:'50%', background:'var(--accent)', display:'inline-block'}}></span>
                                        <span style={{fontSize:'0.58rem', fontWeight:700, letterSpacing:'0.2em', textTransform:'uppercase', color:'rgba(0,0,0,0.3)'}}>HUB</span>
                                    </div>
                                    <div style={{display:'flex', background:'rgba(0,0,0,0.05)', padding:'4px', borderRadius:'10px', gap:'2px', overflowX:'auto'}}>
                                        <button onClick={() => setActiveIdeaTab('captacion')} style={{padding:'0.35rem 0.9rem', borderRadius:'7px', fontSize:'0.6rem', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.1em', cursor:'pointer', border:'none', transition:'all 0.2s', background: activeIdeaTab === 'captacion' ? '#fff' : 'transparent', color: activeIdeaTab === 'captacion' ? '#000' : 'rgba(0,0,0,0.35)', boxShadow: activeIdeaTab === 'captacion' ? '0 1px 4px rgba(0,0,0,0.1)' : 'none'}}>Registro</button>
                                        <button onClick={() => setActiveIdeaTab('gestion')} style={{padding:'0.35rem 0.9rem', borderRadius:'7px', fontSize:'0.6rem', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.1em', cursor:'pointer', border:'none', transition:'all 0.2s', background: activeIdeaTab === 'gestion' ? '#fff' : 'transparent', color: activeIdeaTab === 'gestion' ? '#000' : 'rgba(0,0,0,0.35)', boxShadow: activeIdeaTab === 'gestion' ? '0 1px 4px rgba(0,0,0,0.1)' : 'none'}}>Planificación</button>
                                        <button onClick={() => setActiveIdeaTab('config')} style={{padding:'0.35rem 0.6rem', borderRadius:'7px', fontSize:'0.6rem', fontWeight:700, cursor:'pointer', border:'none', transition:'all 0.2s', background: activeIdeaTab === 'config' ? '#fff' : 'transparent', color: activeIdeaTab === 'config' ? '#000' : 'rgba(0,0,0,0.35)', boxShadow: activeIdeaTab === 'config' ? '0 1px 4px rgba(0,0,0,0.1)' : 'none', display:'flex', alignItems:'center'}}><Icon name="settings" size={14} /></button>
                                    </div>
                                </div>
                                <button onClick={() => setShowModalIdea(true)} style={{background:'#000', color:'var(--accent)', fontWeight:900, fontSize:'0.65rem', letterSpacing:'0.15em', textTransform:'uppercase', padding:'0.6rem 1.25rem', borderRadius:'9999px', border:'none', cursor:'pointer', display:'flex', alignItems:'center', gap:'0.4rem', transition:'all 0.2s', flexShrink:0}}>
                                    <Icon name="plus" size={14} strokeWidth={3} /> <span className="hidden md:inline">Captar Idea</span>
                                </button>
                            </div>
                        </nav>

                        <main className="max-w-[1600px] mx-auto p-4 md:p-8">
                            {activeIdeaTab === 'captacion' && (
                                <section className="space-y-6 animate-fade-in">
                                    <div style={{background:'var(--surface)', borderRadius:'1.25rem', padding:'1.5rem', border:'1px solid rgba(0,0,0,0.05)'}}>
                                        <div className="flex flex-col gap-4 mb-6">
                                            <div className="flex items-center justify-between flex-wrap gap-4">
                                                <div>
                                                    <p style={{fontSize:'0.58rem', fontWeight:700, letterSpacing:'0.25em', textTransform:'uppercase', color:'rgba(0,0,0,0.35)', marginBottom:'0.3rem'}}>Registro Maestro</p>
                                                    <h2 className="text-xl font-black uppercase tracking-tight" style={{letterSpacing:'-0.03em'}}>Ecosistema Livo</h2>
                                                </div>
                                            </div>
                                            <div style={{display:'flex', flexWrap:'wrap', gap:'0.4rem', alignItems:'center', overflowX:'auto', paddingBottom:'0.25rem'}}>
                                                <span style={{fontSize:'0.55rem', fontWeight:700, letterSpacing:'0.2em', textTransform:'uppercase', color:'rgba(0,0,0,0.3)', marginRight:'0.25rem', flexShrink:0}}>Canal ·</span>
                                                <button onClick={() => setFiltroCanalDestino('Todos')} style={{padding:'0.4rem 1rem', borderRadius:'9999px', fontSize:'0.6rem', fontWeight:700, letterSpacing:'0.12em', textTransform:'uppercase', border: filtroCanalDestino === 'Todos' ? '1.5px solid #000' : '1.5px solid rgba(0,0,0,0.12)', background: filtroCanalDestino === 'Todos' ? '#000' : 'rgba(255,255,255,0.7)', color: filtroCanalDestino === 'Todos' ? 'var(--accent)' : 'rgba(0,0,0,0.4)', cursor:'pointer', transition:'all 0.2s', flexShrink:0}}>Todo</button>
                                                {canales.map(c => (
                                                    <button key={c.id} onClick={() => setFiltroCanalDestino(c.nombre)} style={{padding:'0.4rem 1rem', borderRadius:'9999px', fontSize:'0.6rem', fontWeight:700, letterSpacing:'0.12em', textTransform:'uppercase', border: filtroCanalDestino === c.nombre ? '1.5px solid #000' : '1.5px solid rgba(0,0,0,0.12)', background: filtroCanalDestino === c.nombre ? '#000' : 'rgba(255,255,255,0.7)', color: filtroCanalDestino === c.nombre ? 'var(--accent)' : 'rgba(0,0,0,0.4)', cursor:'pointer', transition:'all 0.2s', flexShrink:0}}>{c.nombre}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="bg-white rounded-3xl overflow-hidden shadow-inner border border-gray-200 overflow-x-auto">
                                            <table className="w-full text-left text-sm min-w-[800px]">
                                                <thead>
                                                    <tr className="bg-gray-50 border-b border-gray-100 text-[10px] font-black uppercase text-gray-400 tracking-wider">
                                                        <th className="px-8 py-5 text-black">Concepto / Idea</th>
                                                        <th className="px-6 py-5 text-center">Referencia</th>
                                                        <th className="px-6 py-5 text-center">Meta Visual</th>
                                                        <th className="px-6 py-5 text-center">Canal</th>
                                                        <th className="px-8 py-5 text-right">Acción</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-50">
                                                    {(filtroCanalDestino === 'Todos' ? ideasGenerales : ideasGenerales.filter(i => i.canalDestino === filtroCanalDestino)).map(idea => (
                                                        <tr key={idea.id} className="hover:bg-gray-50/80 transition-colors group">
                                                            <td className="px-8 py-5 font-bold text-gray-900 uppercase italic">{idea.titulo}</td>
                                                            <td className="px-6 py-5 text-center">
                                                                {idea.urlReferencia && <a href={idea.urlReferencia} target="_blank" className="text-gray-300 hover:text-black inline-block"><Icon name="external-link" size={16} /></a>}
                                                            </td>
                                                            <td className="px-6 py-5 text-center">
                                                                {idea.urlObjetivo && <a href={idea.urlObjetivo} target="_blank" className="text-gray-300 hover:text-[#49d5ba] inline-block"><Icon name="layout" size={16} /></a>}
                                                            </td>
                                                            <td className="px-6 py-5 text-center">
                                                                <span className="bg-black text-[#49d5ba] px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-tighter">{idea.canalDestino}</span>
                                                            </td>
                                                            <td className="px-8 py-5 text-right opacity-0 group-hover:opacity-100 transition-opacity">
                                                                <button onClick={() => eliminarIdea(idea.id)} className="text-gray-200 hover:text-red-500 transition-colors"><Icon name="trash-2" size={16} /></button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </section>
                            )}

                            {activeIdeaTab === 'gestion' && (
                                <section className="space-y-6 animate-fade-in">
                                    {canales.length === 0 ? (
                                        <div className="text-center py-20 opacity-20 font-black uppercase italic">Crea canales en configuración primero</div>
                                    ) : canales.map(canal => {

                                        <div className="col-span-3 bg-gray-50 p-6 rounded-2xl grid grid-cols-1 md:grid-cols-2 gap-4 border border-gray-100">
                                            <div className="col-span-2"><label className="text-[9px] font-black uppercase text-gray-400">Idea del Canal</label><input name="idea" defaultValue={editItem.idea} className="w-full bg-white border border-gray-200 rounded-xl px-4 py-2 text-lg font-black outline-none uppercase italic" /></div>
                                            <div><label className="text-[9px] font-black uppercase text-gray-400">Identificador/Código/Clave</label><input name="idClave" defaultValue={editItem.idClave} className="w-full bg-white border border-gray-200 rounded-xl px-4 py-2 outline-none font-bold text-sm uppercase" /></div>
                                            <div><label className="text-[9px] font-black uppercase text-gray-400">Nicho</label><input name="nicho" defaultValue={editItem.nicho} className="w-full bg-white border border-gray-200 rounded-xl px-4 py-2 outline-none font-bold text-sm uppercase" /></div>
                                            <div><label className="text-[9px] font-black uppercase text-gray-400">Subnicho</label><input name="subnicho" defaultValue={editItem.subnicho} className="w-full bg-white border border-gray-200 rounded-xl px-4 py-2 outline-none font-bold text-sm uppercase" /></div>
                                            <div><label className="text-[9px] font-black uppercase text-gray-400">Micronicho</label><input name="micronicho" defaultValue={editItem.micronicho} className="w-full bg-white border border-gray-200 rounded-xl px-4 py-2 outline-none font-bold text-sm uppercase" /></div>
                                            <div><label className="text-[9px] font-black uppercase text-gray-400">Nanonicho</label><input name="nanonicho" defaultValue={editItem.nanonicho} className="w-full bg-white border border-gray-200 rounded-xl px-4 py-2 outline-none font-bold text-sm uppercase" /></div>
                                            <div className="col-span-2"><label className="text-[9px] font-black uppercase text-gray-400">URL Contenido/Canal</label><input name="urlObjetivo" defaultValue={editItem.urlObjetivo} className="w-full bg-white border border-gray-200 rounded-xl px-4 py-2 outline-none font-bold text-sm" /></div>
                                        </div>

                                        {/* Red y Región */}
                                        <div className="space-y-4">
                                            <div><label className="text-[9px] font-black text-gray-400 uppercase">Red Social Principal</label><select name="redSocial" defaultValue={editItem.redSocial} className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none font-bold text-xs uppercase"><option>YouTube</option><option>TikTok</option><option>Instagram</option><option>Facebook</option></select></div>
                                            <div><label className="text-[9px] font-black text-gray-400 uppercase">Formato</label><select name="formato" defaultValue={editItem.formato} className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none font-bold text-xs uppercase"><option>Videos Largos</option><option>Shorts</option></select></div>
                                            <div><label className="text-[9px] font-black text-gray-400 uppercase">Región</label><input name="region" defaultValue={editItem.region} className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none font-bold text-xs uppercase" /></div>
                                            <div><label className="text-[9px] font-black text-gray-400 uppercase">Público</label><input name="publico" defaultValue={editItem.publico} className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none font-bold text-xs uppercase" /></div>
                                        </div>

                                        {/* Métricas */}
                                        <div className="space-y-4">
                                            <div><label className="text-[9px] font-black text-gray-400 uppercase">Escalabilidad (1-5)</label><input name="escalabilidad" type="number" min="1" max="5" defaultValue={editItem.escalabilidad} className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none font-bold" /></div>
                                            <div><label className="text-[9px] font-black text-gray-400 uppercase">Competencia (1-5)</label><input name="competencia" type="number" min="1" max="5" defaultValue={editItem.competencia} className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none font-bold" /></div>
                                            <div><label className="text-[9px] font-black text-gray-400 uppercase">Monetización</label><select name="monetizacion" defaultValue={editItem.monetizacion} className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none uppercase font-bold text-xs"><option value="baja">Baja</option><option value="media">Media</option><option value="alta">Alta</option></select></div>
                                        </div>

                                        {/* Estados */}
                                        <div className="space-y-4">
                                            <div><label className="text-[9px] font-black text-gray-400 uppercase">Prioridad</label><select name="prioridad" defaultValue={editItem.prioridad} className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none uppercase font-bold text-xs"><option value="baja">Baja</option><option value="media">Media</option><option value="alta">Alta</option></select></div>
                                            <div><label className="text-[9px] font-black text-gray-400 uppercase">Estado</label><select name="estado" defaultValue={editItem.estado} className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none uppercase font-bold text-xs"><option>Idea</option><option>En evaluación</option><option>Validado</option><option>En proceso</option><option>Aperturado</option></select></div>
                                        </div>

                                        <button type="submit" className="md:col-span-3 w-full py-5 rounded-2xl text-xl font-black shadow-lg mt-4 active:scale-95 transition-all uppercase italic" style={{backgroundColor: colors.primaryPB}}>Guardar Cambios Vinculados</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {showModalPBNotas && (
                            <div className="fixed inset-0 bg-black/70 backdrop-blur-md z-[60] flex items-center justify-center p-4">
                                <div className="bg-white w-full max-w-4xl rounded-[3rem] shadow-2xl animate-fade-in overflow-hidden">
                                    <div className="p-10 border-b border-gray-100 flex justify-between items-center bg-[#fafafa]">
                                        <div><h2 className="text-4xl font-black italic uppercase urbanist" style={{color: colors.primaryPB}}>Bloc de Notas</h2><p className="text-gray-400 font-bold mt-1 uppercase text-xs tracking-[0.2em]">CANAL: {notaActiva.titulo}</p></div>
                                        <button onClick={() => setShowModalPBNotas(false)} className="text-gray-200 hover:text-red-500 transition-all"><i className="fa-solid fa-circle-xmark text-5xl"></i></button>
                                    </div>
                                    <div className="p-10 bg-white">
                                        <textarea className="w-full h-96 notepad-area-pb text-xl text-gray-800 border-none focus:ring-0 resize-none font-medium outline-none" placeholder="Describe aquí la estrategia de contenido..." value={notaActiva.contenido} onChange={(e) => setNotaActiva({...notaActiva, contenido: e.target.value})}></textarea>
                                    </div>
                                    <div className="p-10 bg-[#f8f8f8] flex justify-end">
                                        <button onClick={() => { const newRadar = registrosPuntoB.map(r => r.id === notaActiva.id ? {...r, observaciones: notaActiva.contenido} : r); setRegistrosPuntoB(newRadar); syncData(canales, ideasGenerales, newRadar); setShowModalPBNotas(false); }} className="px-16 py-5 rounded-3xl text-xl font-black shadow-xl active:scale-95 transition-all uppercase italic" style={{backgroundColor: colors.primaryPB}}>Guardar Bloc</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
