    <style>
        :root {
            --primary-pb: #49d5ba;
            --secondary-pb: #bbf4ed;
            --bg-body: #eeecec;
            --surface: #e0dcdc;
            --text: #000000;
            --accent: #49d5ba;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'DM Sans', 'Inter', sans-serif;
            background-color: var(--bg-body);
            -webkit-font-smoothing: antialiased;
        }
        .font-black { font-weight: 900; }
        .italic { font-style: italic; }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c0bcbc; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #49d5ba; }

        .animate-fade-in { animation: fadeIn 0.55s cubic-bezier(0.22,1,0.36,1) both; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── HOME: editorial byxp ── */
        .home-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-body);
        }
        .home-header {
            padding: 1.75rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }
        .home-cards-grid {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        @media (min-width: 768px) {
            .home-cards-grid { flex-direction: row; }
        }
        .home-nav-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem 2.5rem 2.5rem;
            cursor: pointer;
            transition: background-color 0.28s ease;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
            user-select: none;
        }
        @media (min-width: 768px) {
            .home-nav-card {
                border-bottom: none;
                border-right: 1px solid rgba(0,0,0,0.08);
            }
            .home-nav-card:last-child { border-right: none; }
        }
        .home-nav-card:hover { background-color: #000; }
        .home-nav-card:hover .card-eyebrow { color: rgba(255,255,255,0.35); }
        .home-nav-card:hover .card-title { color: #fff; }
        .home-nav-card:hover .card-subtitle-accent { color: var(--accent); }
        .home-nav-card:hover .card-desc { color: rgba(255,255,255,0.45); }
        .home-nav-card:hover .card-arrow { background-color: var(--accent); color: #000; }
        .home-nav-card:active { opacity: 0.92; }

        .card-eyebrow {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(0,0,0,0.35);
            transition: color 0.28s;
            margin-bottom: 1.25rem;
        }
        .card-top-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .card-title {
            font-family: 'DM Sans', sans-serif;
            font-size: clamp(3.5rem, 9vw, 6rem);
            font-weight: 900;
            line-height: 0.88;
            letter-spacing: -0.04em;
            text-transform: uppercase;
            color: #000;
            transition: color 0.28s;
        }
        .card-subtitle-accent {
            font-family: 'DM Sans', sans-serif;
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: var(--accent);
            transition: color 0.28s;
            margin-top: 0.5rem;
        }
        .card-desc {
            font-size: 0.8rem;
            font-weight: 500;
            line-height: 1.55;
            color: rgba(0,0,0,0.4);
            transition: color 0.28s;
            margin-top: 1.5rem;
            max-width: 300px;
        }
        .card-arrow {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background-color: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.28s;
            flex-shrink: 0;
        }
        .card-bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 3rem;
        }
        .card-step-badge {
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(0,0,0,0.2);
            transition: color 0.28s;
        }
        .home-nav-card:hover .card-step-badge { color: rgba(255,255,255,0.25); }

        /* ── NAVIGATION INTERNA ── */
        .btn-home-pill {
            background-color: #000;
            color: #fff;
            border-radius: 9999px;
            padding: 1.25rem 2rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            font-size: 1.5rem;
            letter-spacing: -0.025em;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 320px;
            text-align: center;
        }
        .btn-home-pill:hover { transform: translateY(-2px); filter: brightness(1.2); }
        .btn-home-pill:active { transform: scale(0.96); }

        /* ── MODULOS SECCIÓN (Idea Hub / Canal) ── */
        .urbanist { font-family: 'Urbanist', 'DM Sans', sans-serif; }
        .main-card-pb {
            background-color: var(--surface);
            border-radius: 1.25rem;
            border: 1px solid rgba(0,0,0,0.04);
        }
        .data-table-container-pb {
            background-color: rgba(255,255,255,0.6);
            border-radius: 0.75rem;
            overflow: hidden;
        }
        .niche-tag-pb {
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 9999px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.08em;
            background-color: var(--secondary-pb);
            color: #1f5a4e;
        }
        .notepad-area-pb {
            background-color: #ffffff;
            background-image: linear-gradient(var(--bg-body) 1px, transparent 1px);
            background-size: 100% 2.5rem;
            line-height: 2.5rem;
        }

        /* ── MÓDULO HEADER EDITORIAL ── */
        .module-eyebrow {
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(0,0,0,0.35);
        }
        .module-eyebrow-accent {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .module-eyebrow-accent::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--accent);
        }
    </style>
</head>

                if (window.lucide) lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size, strokeWidth: strokeWidth, color: color }}></i>;
        };

        const LivoLogo = ({ className = "h-48" }) => (
            <svg viewBox="0 0 300 200" className={className} fill="none" xmlns="http://www.w3.org/2000/svg">
                <text x="20" y="120" fontFamily="Inter, sans-serif" fontWeight="900" fontSize="110" fill="black" style={{ letterSpacing: '-5px' }}>L</text>
                <text x="85" y="120" fontFamily="Inter, sans-serif" fontWeight="900" fontSize="110" fill="black" style={{ letterSpacing: '-5px' }}>ı</text>
                <circle cx="98" cy="45" r="14" fill="#00ead0" />
                <text x="120" y="120" fontFamily="Inter, sans-serif" fontWeight="900" fontSize="110" fill="black" style={{ letterSpacing: '-5px' }}>vo</text>
                <text x="200" y="170" fontFamily="Inter, sans-serif" fontWeight="900" fontSize="55" fill="#00ead0">mx</text>
            </svg>
        );

        const App = () => {
            const colors = {
                neon: '#00ead0',
                primaryPB: '#49d5ba',
                bg: '#f2f0f0',
                card: '#d9d9d9'
            };

            const [currentView, setCurrentView] = useState('home');
            const [loading, setLoading] = useState(true);

            // --- ESTADOS ---
            const [canales, setCanales] = useState([]);
            const [ideasGenerales, setIdeasGenerales] = useState([]);
            const [registrosPuntoB, setRegistrosPuntoB] = useState([]);
            
            const [activeIdeaTab, setActiveIdeaTab] = useState('captacion');
            const [filtroCanalDestino, setFiltroCanalDestino] = useState('Todos');
            const [showModalIdea, setShowModalIdea] = useState(false);
            const [showModalCanal, setShowModalCanal] = useState(false);
            const [showModalPBRapido, setShowModalPBRapido] = useState(false);
            const [showModalPBDesarrollo, setShowModalPBDesarrollo] = useState(false);
            const [showModalPBNotas, setShowModalPBNotas] = useState(false);
            const [editItem, setEditItem] = useState(null);
            const [notaActiva, setNotaActiva] = useState({ id: null, titulo: '', contenido: '' });

            // --- SINCRONIZACIÓN NUBE ---
            const loadData = async () => {
                try {
                    const response = await fetch(SCRIPT_URL);
                    const data = await response.json();
                    if (data.canales) setCanales(data.canales);
                    if (data.ideas) setIdeasGenerales(data.ideas);
                    if (data.radar) setRegistrosPuntoB(data.radar);
                } catch (e) { console.error("Error nube", e); }
                setLoading(false);
            };

            const syncData = async (newC, newI, newR) => {
                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ canales: newC, ideas: newI, radar: newR })
                    });
                } catch (e) { console.error("Error sync", e); }
            };

            useEffect(() => { loadData(); }, []);

            // --- FUNCIONES LOGICA ---
            const agregarCanal = (e) => {
                e.preventDefault();
                const nombre = e.target.nuevoCanal.value.trim().toUpperCase();
                const newC = [...canales, { id: Date.now().toString(), nombre }];
                setCanales(newC);
                syncData(newC, ideasGenerales, registrosPuntoB);
                e.target.reset();
                setShowModalCanal(false);
            };

            const eliminarCanal = (id, nombre) => {
                if (confirm(`¿Eliminar ${nombre}?`)) {
                    const newC = canales.filter(c => c.id !== id);
                    setCanales(newC);
                    syncData(newC, ideasGenerales, registrosPuntoB);
                }
            };

            const captarIdea = (e) => {
                e.preventDefault();
                const f = new FormData(e.target);
                const nueva = {
                    id: Date.now().toString(),
                    titulo: f.get('titulo'),
                    urlReferencia: f.get('urlRef'),
                    urlObjetivo: f.get('urlObj'),
                    canalDestino: f.get('canalDestino'),
                    prioridad: 'Media', estatus: 'Pendiente', formato: 'PD', fechaEstimada: ''
                };
                const newI = [nueva, ...ideasGenerales];
                setIdeasGenerales(newI);
                syncData(canales, newI, registrosPuntoB);
                setShowModalIdea(false);
            };

            const updateIdea = (id, key, value) => {
                const newI = ideasGenerales.map(i => i.id === id ? {...i, [key]: value} : i);
                setIdeasGenerales(newI);
                syncData(canales, newI, registrosPuntoB);
            };

            const eliminarIdea = (id) => {
                if (confirm('¿Eliminar idea?')) {
                    const newI = ideasGenerales.filter(i => i.id !== id);
                    setIdeasGenerales(newI);
                    syncData(canales, newI, registrosPuntoB);
                }
            };

            const registrarPBRapido = (e) => {
                e.preventDefault();
                const f = new FormData(e.target);
                const nuevo = {
                    id: Date.now().toString(),
                    idClave: f.get('idClave') || 'S/C', nicho: f.get('nicho'), subnicho: f.get('subnicho'), idea: f.get('ideaCanal'), urlObjetivo: f.get('urlObjetivo'), redSocial: f.get('redSocial'), formato: f.get('formato'), region: 'Latam', publico: 'Gral', escalabilidad: 3, competencia: 3, monetizacion: 'media', prioridad: 'media', estado: 'Idea', observaciones: ''
                };
                const newR = [...registrosPuntoB, nuevo];
                setRegistrosPuntoB(newR);
                syncData(canales, ideasGenerales, newR);
                setShowModalPBRapido(false);
            };

            const guardarEdicionPB = (e) => {
                e.preventDefault();
                const f = new FormData(e.target);
                const newR = registrosPuntoB.map(r => r.id === editItem.id ? { ...r, idClave: f.get('idClave'), idea: f.get('idea'), estado: f.get('estado') } : r);
                setRegistrosPuntoB(newR);
                syncData(canales, ideasGenerales, newR);
                setShowModalPBDesarrollo(false);
            };

            if (loading) return <div className="h-screen flex items-center justify-center font-black italic text-[#49d5ba] uppercase animate-pulse">Sincronizando Livo Hub...</div>;

            // --- VISTA HOME ---
            if (currentView === 'home') {
                return (
                    <div className="home-wrapper animate-fade-in">
                        <header className="home-header">
                            <LivoLogo className="h-10 md:h-12 w-auto" />
                            <span className="module-eyebrow">Etapa 1 — Captación</span>
                        </header>
                        <div className="home-cards-grid">
                            <div className="home-nav-card" onClick={() => setCurrentView('idea-hub')}>
                                <div>
                                    <p className="card-eyebrow">Módulo 01</p>
                                    <div className="card-top-row">
                                        <div><div className="card-title">Idea</div><div className="card-subtitle-accent">Hub</div></div>
                                        <div className="card-arrow"><Icon name="arrow-right" size={16} strokeWidth={2.5} /></div>
                                    </div>
                                    <p className="card-desc">Captura, organiza y planifica cada concepto de contenido por canal destino.</p>
                                </div>
                                <div className="card-bottom-row"><span className="card-step-badge">Registro · Gestión · Config</span></div>
                            </div>
                            <div className="home-nav-card" onClick={() => setCurrentView('canal-radar')}>
                                <div>
                                    <p className="card-eyebrow">Módulo 02</p>
                                    <div className="card-top-row">
                                        <div><div className="card-title">Canal</div><div className="card-subtitle-accent">Radar</div></div>
                                        <div className="card-arrow"><Icon name="arrow-right" size={16} strokeWidth={2.5} /></div>
                                    </div>
                                    <p className="card-desc">Analiza nichos, captura canales potenciales y evalúa su monetización.</p>
                                </div>
                                <div className="card-bottom-row"><span className="card-step-badge">Punto B · Análisis · Estrategia</span></div>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- VISTAS INTERNAS ---
            return (
                <div className="min-h-screen pb-20 animate-fade-in">
                    <nav className="bg-white border-b sticky top-0 z-50 p-4">
                        <div className="max-w-[1600px] mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setCurrentView('home')} className="p-2 border rounded-full"><Icon name="chevron-left" size={18}/></button>
                                <span className="font-black uppercase text-[10px] tracking-widest">{currentView.replace('-', ' ')}</span>
                            </div>
                            {currentView === 'idea-hub' && (
                                <div className="flex gap-2">
                                    <button onClick={() => setActiveIdeaTab('captacion')} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase ${activeIdeaTab==='captacion'?'bg-black text-[#49d5ba]':'bg-gray-100'}`}>Registro</button>
                                    <button onClick={() => setActiveIdeaTab('gestion')} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase ${activeIdeaTab==='gestion'?'bg-black text-[#49d5ba]':'bg-gray-100'}`}>Planificación</button>
                                    <button onClick={() => setActiveIdeaTab('config')} className="p-2 bg-gray-100 rounded-xl"><Icon name="settings" size={14}/></button>
                                </div>
                            )}
                            <button onClick={() => currentView === 'idea-hub' ? setShowModalIdea(true) : setShowModalPBRapido(true)} className="bg-black text-[#49d5ba] px-6 py-2 rounded-full font-black text-[10px] uppercase">Nuevo Registro</button>
                        </div>
                    </nav>

                    <main className="max-w-[1600px] mx-auto p-4 md:p-8">
                        {currentView === 'idea-hub' ? (
                            <section>
                                {activeIdeaTab === 'captacion' && (
                                    <div className="bg-[#e0dcdc] rounded-[2rem] p-6">
                                        <div className="flex justify-between mb-6">
                                            <h2 className="text-xl font-black uppercase italic">Registro Maestro</h2>
                                            <select onChange={(e)=>setFiltroCanalDestino(e.target.value)} className="bg-white px-4 py-2 rounded-full font-black text-[10px] uppercase outline-none">
                                                <option>Todos</option>
                                                {canales.map(c => <option key={c.id}>{c.nombre}</option>)}
                                            </select>
                                        </div>
                                        <div className="bg-white rounded-3xl overflow-hidden overflow-x-auto shadow-inner">
                                            <table className="w-full text-left min-w-[800px]">
                                                <thead className="bg-gray-50 border-b">
                                                    <tr className="text-[9px] font-black uppercase text-gray-400 tracking-widest">
                                                        <th className="px-8 py-5">Concepto</th><th className="px-8 py-5">Canal</th><th className="px-8 py-5 text-right"></th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {ideasGenerales.filter(i => filtroCanalDestino === 'Todos' || i.canalDestino === filtroCanalDestino).map(idea => (
                                                        <tr key={idea.id} className="border-b last:border-0 hover:bg-gray-50">
                                                            <td className="px-8 py-5 font-bold uppercase italic">{idea.titulo}</td>
                                                            <td className="px-8 py-5"><span className="bg-black text-[#49d5ba] px-4 py-1 rounded-full text-[9px] font-black">{idea.canalDestino}</span></td>
                                                            <td className="px-8 py-5 text-right"><button onClick={() => eliminarIdea(idea.id)} className="text-gray-200 hover:text-red-500"><Icon name="trash-2" size={16}/></button></td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}
                                {activeIdeaTab === 'config' && (
                                    <div className="max-w-xl mx-auto bg-[#e0dcdc] p-8 rounded-[3rem]">
                                        <h2 className="text-2xl font-black uppercase mb-6 italic">Canales</h2>
                                        <div className="space-y-4 mb-8">
                                            {canales.map(c => (
                                                <div key={c.id} className="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                                                    <span className="font-black italic uppercase">{c.nombre}</span>
                                                    <button onClick={() => eliminarCanal(c.id, c.nombre)} className="text-red-500"><Icon name="trash-2" size={16}/></button>
                                                </div>
                                            ))}
                                        </div>
                                        <button onClick={() => setShowModalCanal(true)} className="w-full bg-black text-[#49d5ba] py-4 rounded-2xl font-black uppercase italic">Añadir Canal</button>
                                    </div>
                                )}
                            </section>
                        ) : (
                            <section className="bg-[#e0dcdc] p-6 rounded-[2rem]">
                                <h2 className="text-xl font-black uppercase italic mb-6">Radar de Nichos</h2>
                                <div className="bg-white rounded-3xl overflow-hidden overflow-x-auto">
                                    <table className="w-full min-w-[1000px]">
                                        <thead className="bg-gray-50 font-black text-[9px] uppercase tracking-widest text-gray-400">
                                            <tr><th className="px-6 py-4">Nicho</th><th className="px-6 py-4">Idea</th><th className="px-6 py-4">Estado</th><th className="px-6 py-4 text-right"></th></tr>
                                        </thead>
                                        <tbody>
                                            {registrosPuntoB.map(r => (
                                                <tr key={r.id} className="border-b hover:bg-gray-50">
                                                    <td className="px-6 py-4"><span className="bg-[#bbf4ed] text-[#1f5a4e] px-3 py-1 rounded-full text-[9px] font-bold">{r.nicho}</span></td>
                                                    <td className="px-6 py-4 font-black italic uppercase">{r.idea}</td>
                                                    <td className="px-6 py-4 uppercase font-bold text-[10px]">{r.estado}</td>
                                                    <td className="px-6 py-4 text-right"><button onClick={() => setRegistrosPuntoB(registrosPuntoB.filter(x => x.id !== r.id))} className="text-gray-200 hover:text-red-500"><Icon name="trash-2" size={16}/></button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </section>
                        )}
                    </main>

                    {/* Modales Genéricos */}
                    {showModalCanal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-[60]">
                            <div className="bg-white p-10 rounded-[3rem] w-full max-w-sm text-center animate-fade-in">
                                <h3 className="text-2xl font-black uppercase italic mb-6">Nuevo Canal</h3>
                                <form onSubmit={agregarCanal}>
                                    <input name="nuevoCanal" required className="w-full bg-gray-100 p-4 rounded-xl font-black text-center uppercase mb-6 outline-none" placeholder="EJ: TIKTOK" />
                                    <div className="flex gap-2">
                                        <button type="button" onClick={() => setShowModalCanal(false)} className="flex-1 font-bold text-gray-400 uppercase text-[10px]">Cerrar</button>
                                        <button type="submit" className="flex-2 bg-black text-[#49d5ba] px-8 py-3 rounded-xl font-black uppercase italic">Añadir</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {showModalIdea && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-[60]">
                            <div className="bg-white p-10 rounded-[3rem] w-full max-w-lg animate-fade-in">
                                <h3 className="text-3xl font-black uppercase italic mb-8">Nueva Idea</h3>
                                <form onSubmit={captarIdea} className="space-y-4">
                                    <input name="titulo" required className="w-full bg-gray-100 p-4 rounded-xl font-bold uppercase italic outline-none" placeholder="Título de la Idea" />
                                    <select name="canalDestino" className="w-full bg-black text-[#49d5ba] p-4 rounded-xl font-black uppercase italic outline-none">
                                        {canales.map(c => <option key={c.id} value={c.nombre}>{c.nombre}</option>)}
                                    </select>
                                    <button type="submit" className="w-full bg-[#49d5ba] py-5 rounded-2xl font-black text-xl uppercase italic shadow-lg">Captar Ahora</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
